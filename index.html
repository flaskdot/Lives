<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد - غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-feminine: #1a080a;
            --soft-pink: #d81b60;
            --plum-deep: #4a148c;
            --gold-glow: #f4cf8d;
            --text-color: #fce4ec;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-feminine);
            margin: 0; padding: 0; display: flex; justify-content: center;
            min-height: 100vh; color: var(--text-color); overflow-x: hidden;
        }

        /* هالة الماوس */
        #cursor-glow {
            position: fixed; top: 0; left: 0; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(216, 27, 96, 0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%, -50%);
        }

        .container { width: 100%; max-width: 420px; padding: 40px 15px; text-align: center; z-index: 1; }

        .profile-img {
            width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--soft-pink);
            box-shadow: 0 0 20px rgba(216, 27, 96, 0.3); margin-bottom: 12px; object-fit: cover;
        }

        h1 { color: var(--gold-glow); font-size: 1.6rem; margin: 0 0 10px; }

        .btn-sub-code {
            background: rgba(255,255,255,0.05); color: var(--gold-glow); border: 1px solid var(--soft-pink);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 10px; transition: 0.3s;
        }

        .btn-price-list {
            background: linear-gradient(45deg, #f4cf8d, #d4af37); color: #1a080a;
            border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer;
            font-weight: bold; margin-bottom: 15px; width: 85%; margin-inline: auto; display: block;
        }

        .bio-container {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(216, 27, 96, 0.1); margin-bottom: 25px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }

        .main-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            color: white; transition: 0.4s; text-decoration: none;
        }

        .btn-live { background: linear-gradient(45deg, var(--soft-pink), var(--plum-deep)); }
        .btn-interviews { background: #6a1b9a; border: 1px solid var(--gold-glow); }
        .btn-private { background: #5a1217; }
        .btn-photos { background: #3e0e11; }

        /* الشبكة - 5 أعمدة إجباري */
        .unified-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr) !important; 
            gap: 6px; margin-top: 15px; display: none; 
        }

        .grid-item { 
            aspect-ratio: 1/1; background: #000; border-radius: 6px; 
            position: relative; overflow: hidden; border: 1px solid rgba(216, 27, 96, 0.2); 
            cursor: pointer;
        }

        .blur-wrapper {
            width: 100%; height: 100%; filter: blur(12px); transition: 0.5s; position: relative;
        }

        .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .face-emoji {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 1.1rem; z-index: 1;
        }

        .item-lock { 
            position: absolute; inset: 0; display: flex; justify-content: center; 
            align-items: center; color: var(--gold-glow); font-size: 0.8rem; 
            background: rgba(0,0,0,0.3); z-index: 3;
        }

        /* النوافذ المنبثقة (Modals) */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2a0a0d; padding: 25px; border-radius: 25px; border: 1px solid var(--soft-pink);
            text-align: center; width: 90%; max-width: 360px;
        }

        .price-table { width: 100%; border-collapse: collapse; margin-top: 15px; color: white; }
        .price-table td { border: 1px solid rgba(216, 27, 96, 0.3); padding: 10px 5px; font-size: 0.9rem; }
        .price-table tr td:last-child { color: var(--gold-glow); font-weight: bold; }

        /* أيقونات التواصل */
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .social-icons a { color: var(--gold-glow); font-size: 1.8rem; text-decoration: none; cursor: pointer;}
    </style>
</head>
<body>

<div id="cursor-glow"></div>

<div class="container">
    <div class="header">
        <img src="back.png" class="profile-img" onerror="this.src='https://via.placeholder.com/110'">
        <h1>هبة وأحمد من غزة</h1>
        <button class="btn-sub-code" onclick="openModal('subModal')"> <i class="fas fa-magic"></i> رمز الاشتراك </button>
        <button class="btn-price-list" onclick="openModal('priceModal')"> <i class="fas fa-gem"></i> قائمة الاشتراكات </button>
        
        <div class="bio-container">
            <p style="font-size: 0.9rem; margin: 0;">نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا بكل حب.. 🇵🇸</p>
        </div>
    </div>

    <div class="btn-container">
        <button class="main-btn btn-live" onclick="alert('سنكون متواجدين قريباً في البث المباشر')"> <i class="fas fa-video"></i> دخول البث المباشر (LIVE) </button>
        <button class="main-btn btn-interviews" onclick="openModal('interviewModal')"> <i class="fas fa-microphone-lines"></i> خاص للمقابلات </button>
        <button class="main-btn btn-private" onclick="toggleSection('videoGrid')"> <i class="fas fa-film"></i> فيديوهاتي الخاصة (10) </button>
        <button class="main-btn btn-photos" onclick="toggleSection('photoGrid')"> <i class="fas fa-image"></i> صوري الخاصة </button>
    </div>

    <!-- شبكة الفيديوهات -->
    <div class="unified-grid" id="videoGrid"></div>
    
    <!-- شبكة الصور -->
    <div class="unified-grid" id="photoGrid"></div>

    <!-- أيقونات السوشيال ميديا -->
    <div class="social-icons">
        <a href="https://x.com/Heba_Ahmaed96" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a onclick="alert('يجب الاشتراك لعرض الحسابات الشخصية'); return false;"><i class="fab fa-telegram"></i></a>
        <a onclick="alert('يجب الاشتراك لعرض الحسابات الشخصية'); return false;"><i class="fab fa-snapchat"></i></a>
    </div>
</div>

<!-- نافذة قائمة الأسعار -->
<div id="priceModal" class="modal" onclick="closeModal('priceModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold-glow);">قائمة الاشتراكات</h3>
        <table class="price-table">
            <tr><td>الموقع كامل</td><td>300$</td></tr>
            <tr><td>اللايف فقط</td><td>300$</td></tr>
            <tr><td>الفيديوهات فقط</td><td>250$</td></tr>
            <tr><td>الصور فقط</td><td>200$</td></tr>
        </table>
        <button class="main-btn btn-private" onclick="closeModal('priceModal')" style="margin-top:15px; width:100%;">إغلاق</button>
    </div>
</div>

<!-- نافذة المقابلات -->
<div id="interviewModal" class="modal" onclick="closeModal('interviewModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold-glow);">خاص للمقابلات</h3>
        <p style="font-size:0.9rem; color:white;">يرجى التواصل معنا عبر حساباتنا الرسمية لتحديد موعد مقابلة.</p>
        <button class="main-btn btn-interviews" onclick="window.open('https://x.com/Heba_Ahmaed96', '_blank')" style="margin-top:15px; width:100%;">تواصل عبر X</button>
        <button class="main-btn btn-private" onclick="closeModal('interviewModal')" style="margin-top:10px; width:100%;">إغلاق</button>
    </div>
</div>

<!-- نافذة تفعيل الكود -->
<div id="subModal" class="modal" onclick="closeModal('subModal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold-glow);">تفعيل الاشتراك</h3>
        <input type="text" id="codeInput" style="width:90%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid var(--soft-pink); background:rgba(0,0,0,0.3); color:white; text-align:center;" placeholder="اكتب الرمز هنا...">
        <button class="main-btn btn-live" onclick="checkCode()" style="width:100%;">تفعيل الكود</button>
        <button class="main-btn btn-private" onclick="closeModal('subModal')" style="margin-top:10px; width:100%;">إلغاء</button>
    </div>
</div>

<script>
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
    });

    let isActivated = false;

    // لضمان عدم ظهور أي صور معطوبة، استخدمنا روابطك الشغالة 100% كأغلفة للفيديوهات
    // وعند الضغط سيفتح رابط تويتر الخاص بها.
    const reliableThumbnails = [
        "https://i.postimg.cc/z3v7gxbq/HFSD8Kn-W8AAv-NTJ.jpg",
        "https://i.postimg.cc/bdrgtmDn/HFSi-WFp-Xs-AAKg-Gm.jpg",
        "https://i.postimg.cc/ctvcGJy9/HE-m-Mm-Lb-YAARj-WB.jpg",
        "https://i.postimg.cc/YLvxBSK6/HE2ULww-Xo-AEh-Tsf.jpg",
        "https://i.postimg.cc/Th10DtL6/HE9R1L-Xw-AA0pzw.jpg",
        "https://i.postimg.cc/7bh92KGD/HFcc6Vd-WAAAFLR2.jpg",
        "https://i.postimg.cc/xq85z6Jn/HFf-Q5L3b-QAAXh-Hz.jpg",
        "https://i.postimg.cc/z3v7gxbq/HFSD8Kn-W8AAv-NTJ.jpg", // مكرر لتكملة العدد
        "https://i.postimg.cc/bdrgtmDn/HFSi-WFp-Xs-AAKg-Gm.jpg", // مكرر
        "https://i.postimg.cc/ctvcGJy9/HE-m-Mm-Lb-YAARj-WB.jpg"  // مكرر
    ];

    const videoData = [
        { url: "https://x.com/saraadelok/status/2041442640441266570", hasFace: true },
        { url: "https://x.com/saraadelok/status/2041440733677150380", hasFace: true },
        { url: "https://x.com/saraadelok/status/2039652720114602092", hasFace: false },
        { url: "https://x.com/almunaqaba100K/status/2042114160792605052", hasFace: true },
        { url: "https://x.com/almunaqaba100K/status/2042114062759203218", hasFace: true },
        { url: "https://x.com/almunaqaba100K/status/2040031645533651026", hasFace: false },
        { url: "https://x.com/almunaqaba100K/status/2040031542160851069", hasFace: false },
        { url: "https://x.com/almunaqaba100K/status/2039268707784884419", hasFace: true },
        { url: "https://x.com/almunaqaba100K/status/2039206491064832336", hasFace: true },
        { url: "https://x.com/almunaqaba100K/status/2037848827856581045", hasFace: false }
    ];

    // قسم الصور يحتوي على جميع الصور السبعة التي أرفقتها مسبقاً
    const photoLinks = [
        "https://i.postimg.cc/ctvcGJy9/HE-m-Mm-Lb-YAARj-WB.jpg",
        "https://i.postimg.cc/YLvxBSK6/HE2ULww-Xo-AEh-Tsf.jpg",
        "https://i.postimg.cc/Th10DtL6/HE9R1L-Xw-AA0pzw.jpg",
        "https://i.postimg.cc/7bh92KGD/HFcc6Vd-WAAAFLR2.jpg",
        "https://i.postimg.cc/xq85z6Jn/HFf-Q5L3b-QAAXh-Hz.jpg",
        "https://i.postimg.cc/z3v7gxbq/HFSD8Kn-W8AAv-NTJ.jpg",
        "https://i.postimg.cc/bdrgtmDn/HFSi-WFp-Xs-AAKg-Gm.jpg"
    ];

    function initGrids() {
        const vGrid = document.getElementById('videoGrid');
        videoData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            const emojiHTML = item.hasFace ? '<div class="face-emoji">🙈</div>' : '';
            div.innerHTML = `
                <div class="blur-wrapper">
                    ${emojiHTML}
                    <img src="${reliableThumbnails[index]}">
                </div>
                <div class="item-lock"><i class="fas fa-play"></i></div>
            `;
            div.onclick = () => {
                if (isActivated) {
                    window.open(item.url, '_blank');
                } else {
                    alert("يرجى تفعيل الكود لمشاهدة هذا الفيديو الخاص.");
                }
            };
            vGrid.appendChild(div);
        });

        const pGrid = document.getElementById('photoGrid');
        photoLinks.forEach(link => {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `
                <div class="blur-wrapper">
                    <img src="${link}">
                </div>
                <div class="item-lock"><i class="fas fa-lock"></i></div>
            `;
            div.onclick = () => {
                if (isActivated) {
                    alert("الصورة واضحة الآن!"); // هنا يمكنك فتح الصورة لاحقاً إذا أردت
                } else {
                    alert("هذه الصورة متاحة للمشتركين فقط.");
                }
            };
            pGrid.appendChild(div);
        });
    }

    function toggleSection(id) {
        const v = document.getElementById('videoGrid');
        const p = document.getElementById('photoGrid');
        
        if (id === 'videoGrid') {
            v.style.display = (v.style.display === 'grid') ? 'none' : 'grid';
            p.style.display = 'none';
        } else {
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
            v.style.display = 'none';
        }
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function checkCode() {
        const code = document.getElementById('codeInput').value;
        if (code === "GAZA2026") {
            isActivated = true;
            alert("تم التفعيل بنجاح! جميع المحتوى الآن متاح للضغط.");
            
            // إزالة الغبش والأقفال والإيموجي
            document.querySelectorAll('.blur-wrapper').forEach(el => el.style.filter = 'none');
            document.querySelectorAll('.item-lock, .face-emoji').forEach(el => el.style.display = 'none');
            
            closeModal('subModal');
        } else {
            alert("رمز التفعيل غير صحيح، يرجى المحاولة مرة أخرى.");
        }
    }

    // تفعيل الشبكات عند بدء تحميل الصفحة
    initGrids();
</script>
</body>
</html>
