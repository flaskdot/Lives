<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد من غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-pink: #f8bbd0; /* وردي هادئ */
            --dark-pink: #f06292;
            --soft-white: #fff9fb;
            --text-color: #5d4037;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-white);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding: 20px;
            text-align: center;
        }

        /* رأس الصفحة */
        .header {
            margin-top: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-pink);
            padding: 3px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin: 15px 0 5px;
            color: var(--dark-pink);
        }

        .bio {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* الأزرار */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .main-btn {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(248, 187, 208, 0.4);
        }

        .main-btn:hover {
            background-color: var(--dark-pink);
            transform: translateY(-2px);
        }

        .btn-live {
            background-color: #ff4d4d; /* لون أحمر للبث المباشر */
            box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3);
        }

        .btn-live:hover {
            background-color: #e60000;
        }

        /* قسم الفيديوهات المقفولة */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            display: none; /* مخفي افتراضياً ويظهر عند الضغط */
        }

        .video-item {
            position: relative;
            aspect-ratio: 9/16;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px); /* تأثير الغباش */
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .lock-overlay i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .lock-overlay span {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150" alt="هبة وأحمد" class="profile-img">
        <h1>هبة وأحمد من غزة</h1>
        <p class="bio">نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا.. <br> شكراً لدعمكم وحبكم المستمر 🇵🇸❤️</p>
    </div>

    <div class="btn-container">
        <button class="main-btn" onclick="toggleVideos()">
            <i class="fas fa-lock"></i> فيديوهاتي الخاصة
        </button>

        <a href="#" class="main-btn btn-live">
            <i class="fas fa-video"></i> انضموا للبث المباشر (LIVE)
        </a>
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleVideos() {
        var grid = document.getElementById("videoGrid");
        if (grid.style.display === "grid") {
            grid.style.display = "none";
        } else {
            grid.style.display = "grid";
        }
    }
</script>

</body>
</html>
