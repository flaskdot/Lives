<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد - غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1a0507; 
            --accent-warm: #8d3e45; 
            --gold-soft: #d4af37; 
            --text-light: #f3e5e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #3d1216 0%, #1a0507 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-light);
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid var(--gold-soft);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            margin-bottom: 15px;
        }

        h1 { color: var(--gold-soft); font-size: 1.6rem; margin-bottom: 10px; }

        .bio {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-live { background: linear-gradient(45deg, #b71c1c, #880e4f); }
        .btn-private { background: var(--accent-warm); border: 1px solid rgba(255,255,255,0.1); }
        .btn-photos { background: #5d2a2e; border: 1px solid rgba(255,255,255,0.1); }

        .main-btn:active { transform: scale(0.97); }

        /* أيقونات التواصل الاجتماعي */
        .social-icons {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a {
            color: var(--gold-soft);
            font-size: 1.8rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-icons a:hover {
            color: white;
            transform: translateY(-5px);
        }

        /* شبكة الفيديوهات */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            display: none;
        }

        .video-card {
            background: #000;
            aspect-ratio: 9/16;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .video-card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: blur(20px); opacity: 0.5;
        }

        .lock-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4);
        }

        .lock-overlay i { font-size: 1.5rem; color: var(--gold-soft); margin-bottom: 5px; }
        .lock-overlay span { font-size: 0.65rem; color: #ffcdd2; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150/4a1414/d4af37?text=H&A" class="profile-img">
        <h1>هبة وأحمد من غزة</h1>
        <div class="bio">
            نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا.. 🇵🇸
        </div>
    </div>

    <div class="btn-container">
        <a href="#" class="main-btn btn-live">
            <i class="fas fa-video"></i> دخول البث المباشر (LIVE)
        </a>

        <button class="main-btn btn-private" onclick="toggleVideos()">
            <i class="fas fa-lock"></i> فيديوهاتي الخاصة
        </button>

        <button class="main-btn btn-photos" onclick="alert('هذا القسم مقفل حالياً')">
            <i class="fas fa-images"></i> صوري الخاصة (مقفول)
        </button>
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="video-card">
            <img src="https://via.placeholder.com/300x500"><div class="lock-overlay"><i class="fas fa-lock"></i><span>محتوى حساس</span></div>
        </div>
        <div class="video-card">
            <img src="https://via.placeholder.com/300x500"><div class="lock-overlay"><i class="fas fa-lock"></i><span>محتوى حساس</span></div>
        </div>
        <div class="video-card">
            <img src="https://via.placeholder.com/300x500"><div class="lock-overlay"><i class="fas fa-lock"></i><span>محتوى حساس</span></div>
        </div>
        <div class="video-card">
            <img src="https://via.placeholder.com/300x500"><div class="lock-overlay"><i class="fas fa-lock"></i><span>محتوى حساس</span></div>
        </div>
    </div>

    <div class="social-icons">
        <a href="#" title="Snapchat"><i class="fab fa-snapchat"></i></a>
        <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
        <a href="#" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div style="margin-top: 30px; font-size: 0.7rem; opacity: 0.5;">
        <i class="fas fa-heart"></i> شكراً لدعمكم المستمر
    </div>
</div>

<script>
    function toggleVideos() {
        var grid = document.getElementById("videoGrid");
        grid.style.display = (grid.style.display === "grid") ? "none" : "grid";
        if(grid.style.display === "grid") grid.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
