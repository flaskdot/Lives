<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد - غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-feminine: #1a080a; /* عنابي داكن جداً */
            --soft-pink: #d81b60; /* وردي قوي ونبيل */
            --plum-deep: #4a148c; /* موف عميق */
            --gold-glow: #f4cf8d; /* ذهبي ناعم */
            --text-color: #fce4ec;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-feminine);
            margin: 0; padding: 0; display: flex; justify-content: center;
            min-height: 100vh; color: var(--text-color); overflow-x: hidden;
            cursor: crosshair;
        }

        /* لمسة فنية: هالة تتبع الماوس */
        #cursor-glow {
            position: fixed; top: 0; left: 0; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(216, 27, 96, 0.15) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: -1; transform: translate(-50%, -50%);
        }

        .container { width: 100%; max-width: 420px; padding: 40px 15px; text-align: center; z-index: 1; }

        .profile-img {
            width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--soft-pink);
            box-shadow: 0 0 20px rgba(216, 27, 96, 0.3); margin-bottom: 12px;
        }

        h1 { color: var(--gold-glow); font-size: 1.6rem; margin: 0 0 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .btn-sub-code {
            background: rgba(255,255,255,0.05); color: var(--gold-glow); border: 1px solid var(--soft-pink);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; transition: 0.3s;
        }

        .bio-container {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(216, 27, 96, 0.1); margin-bottom: 25px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }

        .main-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            color: white; transition: 0.4s; text-decoration: none;
        }

        .btn-live { background: linear-gradient(45deg, var(--soft-pink), var(--plum-deep)); }
        .btn-private { background: #5a1217; }
        .btn-photos { background: #3e0e11; }

        .main-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* شبكة المحتوى الموحدة */
        .unified-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
            margin-top: 15px; display: none; padding: 10px 0;
        }

        .grid-item {
            aspect-ratio: 1/1; background: #000; border-radius: 6px;
            position: relative; overflow: visible; /* للسماح بالتكبير */
            border: 1px solid rgba(216, 27, 96, 0.2); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; z-index: 1;
        }

        /* اللمسة الفنية: التكبير بنصف الحجم عند مرور الماوس */
        .grid-item:hover {
            transform: scale(1.5); /* يكبر بنسبة 50% */
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--gold-glow);
        }

        .grid-item img { width: 100%; height: 100%; object-fit: cover; filter: blur(10px); opacity: 0.4; border-radius: 6px; }

        .item-lock {
            position: absolute; inset: 0; display: flex; justify-content: center;
            align-items: center; color: var(--gold-glow); font-size: 0.8rem;
        }

        .social-icons { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .social-icons a { color: var(--gold-glow); font-size: 2rem; transition: 0.3s; cursor: pointer; }
        .social-icons a:hover { color: var(--soft-pink); transform: translateY(-5px); }

        /* نافذة الرمز */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2a0a0d; padding: 30px; border-radius: 25px; border: 1px solid var(--soft-pink);
            text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 30px rgba(216, 27, 96, 0.2);
        }

        .modal-input {
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--soft-pink);
            background: rgba(0,0,0,0.3); color: white; text-align: center;
        }
    </style>
</head>
<body>

<div id="cursor-glow"></div>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150/4a1414/d81b60?text=H&A" class="profile-img">
        <h1>هبة وأحمد من غزة</h1>
        <button class="btn-sub-code" onclick="openSubModal()"> <i class="fas fa-magic"></i> رمز الاشتراك </button>
        <div class="bio-container">
            <p style="font-size: 0.9rem; margin: 0;">نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا بكل حب.. 🇵🇸</p>
            <small style="color: var(--gold-glow); font-size: 0.75rem; opacity: 0.7;">للاشتراك التواصل عبر تويتر بالأسفل</small>
        </div>
    </div>

    <div class="btn-container">
        <button class="main-btn btn-live" onclick="alert('سنكون متواجدين قريباً')"> 
            <i class="fas fa-broadcast-tower"></i> دخول البث المباشر (LIVE) 
        </button>
        
        <button class="main-btn btn-private" onclick="toggleSection('videoGrid')"> 
            <i class="fas fa-video"></i> فيديوهاتي الخاصة (7) 
        </button>
        
        <button class="main-btn btn-photos" onclick="toggleSection('photoGrid')"> 
            <i class="fas fa-camera-retro"></i> صوري الخاصة 
        </button>
    </div>

    <div class="unified-grid" id="videoGrid"></div>
    <div class="unified-grid" id="photoGrid"></div>

    <div class="social-icons">
        <a onclick="requireSub()"><i class="fab fa-snapchat"></i></a>
        <a onclick="requireSub()"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com/your_twitter" target="_blank"><i class="fab fa-x-twitter"></i></a>
    </div>
</div>

<div id="subModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold-glow); margin:0;">تفعيل الاشتراك الحصري</h3>
        <p style="font-size:0.85rem; color:#d1b8b8;">ادخل الرمز لفتح عالمنا الخاص</p>
        <input type="text" id="codeInput" class="modal-input" placeholder="اكتب الرمز هنا...">
        <button class="btn-live" onclick="checkCode()" style="width:100%; padding:12px; border-radius:10px; border:none; color:white; font-weight:bold; cursor:pointer;">دخول</button>
    </div>
</div>

<script>
    // تتبع الماوس
    const glow = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', (e) => {
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
    });

    // توليد 22 صورة
    const pGrid = document.getElementById('photoGrid');
    for (let i = 1; i <= 22; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `<img src="https://via.placeholder.com/150"><div class="item-lock"><i class="fas fa-lock"></i></div>`;
        pGrid.appendChild(item);
    }

    // توليد 7 فيديوهات فقط
    const vGrid = document.getElementById('videoGrid');
    for (let i = 1; i <= 7; i++) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `<img src="https://via.placeholder.com/150"><div class="item-lock"><i class="fas fa-play"></i></div>`;
        vGrid.appendChild(item);
    }

    function toggleSection(id) {
        const el = document.getElementById(id);
        const otherId = (id === 'videoGrid') ? 'photoGrid' : 'videoGrid';
        document.getElementById(otherId).style.display = 'none';
        el.style.display = (el.style.display === 'grid') ? 'none' : 'grid';
    }

    function checkCode() {
        const code = document.getElementById('codeInput').value;
        if (code !== "GAZA2026") { // يمكنك تغيير الكود الصحيح هنا
            alert("لقد ادخلت بيانات خاطئة يجب الحصول على كود الدخول من مالك الصفحة");
        } else {
            alert("تم التفعيل بنجاح!");
            location.reload();
        }
    }

    function requireSub() { alert("يجب الاشتراك للوصول لمحتوانا الحصري"); }
    function openSubModal() { document.getElementById('subModal').style.display = 'flex'; }
</script>

</body>
</html>
