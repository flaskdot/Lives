<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد - غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-feminine: #1a080a;
            --soft-pink: #d81b60;
            --gold-glow: #f4cf8d;
            --text-color: #fce4ec;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-feminine);
            margin: 0; padding: 0; display: flex; justify-content: center;
            min-height: 100vh; color: var(--text-color); overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; padding: 40px 15px; text-align: center; }

        /* نافذة العداد ورسالة الانتظار */
        #timerOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); z-index: 9999; justify-content: center; align-items: center;
        }

        .timer-box {
            background: #2a0a0d; padding: 30px; border-radius: 25px; border: 2px solid var(--soft-pink);
            width: 85%; max-width: 350px; text-align: center;
        }

        .timer-digits {
            font-size: 3rem; color: var(--gold-glow); font-weight: bold; margin: 20px 0;
            font-family: monospace;
        }

        .main-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer; color: white; margin-bottom: 10px;
        }

        .btn-private { background: #5a1217; }
        .btn-photos { background: #3e0e11; }
        .btn-code { background: transparent; border: 1px solid var(--soft-pink); color: var(--gold-glow); }

        .unified-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 15px; display:none; }
        .grid-item { aspect-ratio: 1/1; background: #000; border: 1px solid #333; border-radius: 5px; overflow: hidden; filter: blur(10px); opacity: 0.5; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 8000; justify-content: center; align-items: center; }
        .modal-content { background: #2a0a0d; padding: 25px; border-radius: 20px; border: 1px solid var(--soft-pink); width: 85%; }
        
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--soft-pink); background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>

<div id="timerOverlay">
    <div class="timer-box">
        <h3 id="overlayHeader" style="color:var(--gold-glow);">أهلاً بك يا غالي</h3>
        <p id="overlayMessage" style="font-size:0.95rem; line-height:1.6;"></p>
        <div id="timerDisplay" class="timer-digits">24:00:00</div>
        <button class="main-btn btn-private" onclick="closeOverlay()">موافق</button>
    </div>
</div>

<div class="container">
    <img src="back.png" style="width:110px; border-radius:50%; border:2px solid var(--soft-pink);" onerror="this.src='https://via.placeholder.com/110'">
    <h1 style="color:var(--gold-glow);">هبة وأحمد من غزة</h1>
    
    <button class="main-btn btn-code" onclick="openModal('subModal')">رمز الاشتراك</button>

    <div style="margin-top:20px;">
        <button class="main-btn btn-private" onclick="handleSectionClick()">فيديوهاتي الخاصة</button>
        <button class="main-btn btn-photos" onclick="handleSectionClick()">صوري الخاصة</button>
    </div>

    <div id="dummyGrid" class="unified-grid">
        <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
    </div>
</div>

<div id="subModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold-glow);">تفعيل الاشتراك</h3>
        <input type="text" id="codeInput" placeholder="اكتب الرمز هنا...">
        <button class="main-btn btn-private" onclick="processActivation()">تفعيل الآن</button>
        <button class="main-btn btn-code" onclick="closeModal('subModal')">إلغاء</button>
    </div>
</div>

<script>
    const validCodes = [
        "Hhaboush158947ahmed", "Hhaboush160947ahmed", "Hhaboush158997ahmed",
        "Hhaboush388947ahmed", "Hhaboush165847ahmed", "Hhaboush968000ahmed"
    ];

    let timerUpdate;

    function processActivation() {
        const input = document.getElementById('codeInput').value.trim();
        if (validCodes.includes(input)) {
            // تحديد وقت الانتهاء: الآن + 24 ساعة
            const targetTime = new Date().getTime() + (24 * 60 * 60 * 1000);
            localStorage.setItem("sub_target", targetTime);
            localStorage.setItem("sub_status", "waiting");
            
            closeModal('subModal');
            showTeaser("اهلا وسهلا بك في موقعنا الشخصي هبة واحمد تم تفعيل كود اشتراك شهري يرجى حفظ رمز الدخول لتتمكن من عرض هذا المحتوى. سيكون المحتوى الخاص بنا متاح بعد 24 ساعة.");
        } else {
            alert("رمز التفعيل غير صحيح!");
        }
    }

    function handleSectionClick() {
        const status = localStorage.getItem("sub_status");
        const target = localStorage.getItem("sub_target");
        const now = new Date().getTime();

        if (!status) {
            openModal('subModal');
        } else if (status === "waiting") {
            if (now >= target) {
                // انتهت الـ 24 ساعة -> اطلب كود جديد
                localStorage.clear(); // تصفير كل شيء لإجباره على البدء من جديد
                alert("يرجى ادخال كود الاشتراك الصحيح");
                openModal('subModal');
            } else {
                // لا يزال العداد يعمل
                showTeaser("سيكون المحتوى الخاص بنا متاح بعد 24 ساعة.");
            }
        }
    }

    function showTeaser(msg) {
        document.getElementById('overlayMessage').innerText = msg;
        document.getElementById('timerOverlay').style.display = 'flex';
        updateTimer();
    }

    function updateTimer() {
        if (timerUpdate) clearInterval(timerUpdate);
        
        timerUpdate = setInterval(() => {
            const target = localStorage.getItem("sub_target");
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                clearInterval(timerUpdate);
                document.getElementById('timerDisplay').innerText = "00:00:00";
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('timerDisplay').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function closeOverlay() { document.getElementById('timerOverlay').style.display = 'none'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // عند تحميل الصفحة، إذا كان هناك عداد نشط، ابدأ بتحديثه في الخلفية
    window.onload = () => { if(localStorage.getItem("sub_target")) updateTimer(); };
</script>
</body>
</html>
