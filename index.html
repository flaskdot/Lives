<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد - غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1f0609;
            --accent-warm: #9e4a51;
            --gold-soft: #e0b966;
            --text-light: #f3e5e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #3d1216 0%, #1f0609 100%);
            margin: 0; padding: 0; display: flex; justify-content: center;
            min-height: 100vh; color: var(--text-light); overflow-x: hidden;
        }

        .container { width: 100%; max-width: 420px; padding: 40px 20px; text-align: center; }

        .profile-img {
            width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--gold-soft);
            box-shadow: 0 0 20px rgba(224, 185, 102, 0.2); margin-bottom: 15px;
        }

        h1 { color: var(--gold-soft); font-size: 1.6rem; margin: 0 0 10px; }

        .btn-sub-code {
            background: transparent; color: var(--gold-soft); border: 1px solid var(--gold-soft);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px;
        }

        .bio-container {
            background: rgba(255,255,255,0.04); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08); margin-bottom: 30px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }

        .main-btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-size: 1rem; font-weight: 600; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; color: white; transition: 0.3s;
        }

        .btn-live { background: linear-gradient(45deg, #b71c1c, #880e4f); }
        .btn-private { background: var(--accent-warm); }
        .btn-photos { background: #5d2a2e; }

        /* شبكة الصور - 22 صورة */
        .photo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-top: 20px; display: none;
        }

        .photo-item {
            aspect-ratio: 1/1; background: #000; border-radius: 8px;
            position: relative; overflow: hidden; border: 1px solid rgba(224,185,102,0.1);
            cursor: pointer;
        }

        .photo-item img { width: 100%; height: 100%; object-fit: cover; filter: blur(10px); opacity: 0.5; }

        .photo-lock {
            position: absolute; inset: 0; display: flex; justify-content: center;
            align-items: center; color: var(--gold-soft); font-size: 1.2rem;
        }

        /* نافذة تكبير الصورة المقفولة */
        .full-photo-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
        }

        .full-photo-content {
            width: 80%; max-width: 300px; aspect-ratio: 9/16; background: #2a0b10;
            border-radius: 20px; border: 2px solid var(--gold-soft); position: relative;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .full-photo-content img { width: 100%; height: 100%; object-fit: cover; filter: blur(30px); }

        .social-icons { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .social-icons a { color: var(--gold-soft); font-size: 2rem; transition: 0.3s; cursor: pointer; }

        /* صندوق كود الاشتراك */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px); z-index: 3000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2a0b10; padding: 30px; border-radius: 25px; border: 1px solid var(--gold-soft);
            text-align: center; width: 85%; max-width: 320px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150/4a1414/e0b966?text=H&A" class="profile-img">
        <h1>هبة وأحمد من غزة</h1>
        <button class="btn-sub-code" onclick="openSubModal()"> <i class="fas fa-key"></i> رمز الاشتراك </button>
        <div class="bio-container">
            <p>نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا بكل حب.. 🇵🇸</p>
            <small style="color: #bcaaa4;">للاشتراك التواصل عبر تويتر بالأسفل</small>
        </div>
    </div>

    <div class="btn-container">
        <a href="#" class="main-btn btn-live"> <i class="fas fa-video"></i> دخول البث المباشر (LIVE) </a>
        <button class="main-btn btn-private" onclick="toggleSection('videoGrid')"> <i class="fas fa-user-lock"></i> فيديوهاتي الخاصة </button>
        <button class="main-btn btn-photos" onclick="toggleSection('photoGrid')"> <i class="fas fa-images"></i> صوري الخاصة </button>
    </div>

    <div class="photo-grid" id="photoGrid">
        </div>

    <div class="photo-grid" id="videoGrid" style="grid-template-columns: 1fr 1fr;">
        <div class="photo-item" style="aspect-ratio: 9/16;"><div class="photo-lock"><i class="fas fa-lock"></i></div></div>
        <div class="photo-item" style="aspect-ratio: 9/16;"><div class="photo-lock"><i class="fas fa-lock"></i></div></div>
        <div class="photo-item" style="aspect-ratio: 9/16;"><div class="photo-lock"><i class="fas fa-lock"></i></div></div>
        <div class="photo-item" style="aspect-ratio: 9/16;"><div class="photo-lock"><i class="fas fa-lock"></i></div></div>
    </div>

    <div class="social-icons">
        <a onclick="requireSub()"><i class="fab fa-snapchat"></i></a>
        <a onclick="requireSub()"><i class="fab fa-instagram"></i></a>
        <a href="https://x.com/your_handle" target="_blank"><i class="fab fa-x-twitter"></i></a>
    </div>
</div>

<div id="photoModal" class="full-photo-modal" onclick="this.style.display='none'">
    <div class="full-photo-content">
        <img src="https://via.placeholder.com/300x600" alt="Private">
        <div style="position:absolute; text-align:center;">
            <i class="fas fa-lock" style="font-size:3rem; color:var(--gold-soft);"></i>
            <p style="font-size:0.8rem; margin-top:10px;">محتوى خاص بالمشتركين</p>
        </div>
    </div>
    <p style="margin-top:20px; color:var(--gold-soft);">إضغط للإغلاق</p>
</div>

<div id="subModal" class="modal" onclick="closeSubModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2>تفعيل الاشتراك</h2>
        <p>ادخل هنا رمز الاشتراك لفتح القفل والتمتع بالخدمات لدينا</p>
        <input type="text" style="width:100%; padding:10px; margin:15px 0; border-radius:10px; border:none; text-align:center;" placeholder="الرمز...">
        <button class="btn-live" style="width:100%; padding:10px; border-radius:10px; border:none; color:white; font-weight:bold;">تفعيل</button>
    </div>
</div>

<script>
    // توليد 22 صورة في الشبكة
    const grid = document.getElementById('photoGrid');
    for (let i = 1; i <= 22; i++) {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.onclick = () => document.getElementById('photoModal').style.display = 'flex';
        item.innerHTML = `<img src="https://via.placeholder.com/150"><div class="photo-lock"><i class="fas fa-lock"></i></div>`;
        grid.appendChild(item);
    }

    function toggleSection(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'grid') ? 'none' : 'grid';
        if(el.style.display === 'grid') el.scrollIntoView({ behavior: 'smooth' });
    }

    function requireSub() {
        alert("يجب الاشتراك للوصول لمحتوانا الحصري");
    }

    function openSubModal() { document.getElementById('subModal').style.display = 'flex'; }
    function closeSubModal() { document.getElementById('subModal').style.display = 'none'; }
</script>

</body>
</html>
