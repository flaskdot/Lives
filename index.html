<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هبة وأحمد من غزة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* لوحة ألوان دافئة وداكنة */
            --bg-dark: #2c0b0e; /* أحمر داكن جداً (عنابي مخملي) */
            --accent-warm: #8d3e45; /* وردي خشبي غامق */
            --gold-soft: #c5a059; /* ذهبي هادئ للأزرار */
            --text-light: #f3e5e5;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: linear-gradient(180deg, #3d1216 0%, #1a0507 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-light);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
        }

        /* رأس الصفحة */
        .header {
            margin-bottom: 40px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--gold-soft);
            padding: 5px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            margin: 20px 0 10px;
            color: var(--gold-soft);
            letter-spacing: 1px;
        }

        .bio {
            font-size: 0.95rem;
            color: #d1b8b8;
            line-height: 1.6;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* الأزرار */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 30px;
        }

        .main-btn {
            background: var(--accent-warm);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .main-btn:active {
            transform: scale(0.98);
        }

        .btn-live {
            background: linear-gradient(45deg, #b71c1c, #880e4f);
            border: 1px solid #ff5252;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(183, 28, 28, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(183, 28, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(183, 28, 28, 0); }
        }

        /* فيديوهات حساسة */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
            display: none; /* تظهر عند الضغط */
        }

        .video-item {
            position: relative;
            aspect-ratio: 9/14;
            background: #1a0507;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(15px) brightness(0.5); /* تعتيم وغباش قوي */
        }

        .lock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
        }

        .lock-overlay i {
            font-size: 1.8rem;
            color: var(--gold-soft);
            margin-bottom: 8px;
        }

        .lock-overlay span {
            font-size: 0.75rem;
            color: #ffcdd2;
            font-weight: bold;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://via.placeholder.com/150/4a1414/ffffff?text=Heba+&+Ahmed" alt="هبة وأحمد" class="profile-img">
        <h1>هبة وأحمد من غزة</h1>
        <div class="bio">
            نحن زوجين من غزة، نشارككم لحظاتنا ويومياتنا.. 🇵🇸<br>
            دعمكم لنا هو سر استمرارنا.
        </div>
    </div>

    <div class="btn-container">
        <a href="#" class="main-btn btn-live">
            <i class="fas fa-satellite-dish"></i> انضموا للبث المباشر (LIVE)
        </a>

        <button class="main-btn" onclick="toggleVideos()">
            <i class="fas fa-user-lock"></i> فيديوهاتي الخاصة (4)
        </button>
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
        <div class="video-item">
            <img src="https://via.placeholder.com/300x500" alt="video">
            <div class="lock-overlay">
                <i class="fas fa-lock"></i>
                <span>محتوى حساس</span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleVideos() {
        var grid = document.getElementById("videoGrid");
        if (grid.style.display === "grid") {
            grid.style.display = "none";
        } else {
            grid.style.display = "grid";
            grid.scrollIntoView({ behavior: 'smooth' });
        }
    }
</script>

</body>
</html>
